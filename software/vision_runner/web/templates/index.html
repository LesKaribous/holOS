<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Vision Pipeline Runner</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header class="topbar">
  <div class="title">vision-runner</div>
  <div class="status-line">
    <span class="badge" id="src-badge">{{ source_kind }} · {{ source_path }}</span>
    <span class="badge" id="reload-badge">build #—</span>
    <span class="badge" id="fps-badge">— fps</span>
    <span class="badge ghost" id="err-badge"></span>
    <button id="btn-reload" title="Force pipeline rebuild">↻ rebuild</button>
  </div>
</header>

<!-- Playback controls live in the vision_camera UI (port 5174). The
     runner just consumes the stream — no playback control here. -->

<!-- Output tiles, generated dynamically -->
<main id="tiles" class="tiles"></main>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
