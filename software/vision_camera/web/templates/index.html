<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Virtual camera · {{ source_kind }} · {{ source_path }}</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header class="bar">
  <div class="title">virtual camera</div>
  <span class="badge" id="src-badge">{{ source_kind }} · {{ source_path }}</span>
  <span class="badge" id="frame-badge">—</span>
  <span class="badge ghost" id="err-badge"></span>
  <span class="badge" id="stream-badge">stream → /stream.mjpg</span>
</header>

<section class="playback" id="playback">
  <button class="pb-btn" data-act="step_back_10" title="-10 frames">⏮⏮</button>
  <button class="pb-btn" data-act="step_back"    title="-1 frame">⏮</button>
  <button class="pb-btn" data-act="pause" data-toggle-mode="pause" title="Pause">⏸</button>
  <button class="pb-btn" data-act="play"  data-toggle-mode="play"  title="Play">▶</button>
  <button class="pb-btn" data-act="live"  data-toggle-mode="live"  title="Live (camera)">●</button>
  <button class="pb-btn" data-act="step"  title="+1 frame">⏭</button>
  <button class="pb-btn" data-act="step_10" title="+10 frames">⏭⏭</button>
  <select id="speed-sel" title="Playback speed">
    <option value="0.25">0.25×</option>
    <option value="0.5">0.5×</option>
    <option value="1" selected>1×</option>
    <option value="2">2×</option>
    <option value="4">4×</option>
    <option value="8">8×</option>
  </select>
</section>

<main class="preview">
  <img src="/stream.mjpg" alt="live preview" />
</main>

<script src="/static/app.js"></script>
</body>
</html>
