<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Vision debug · holOS</title>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --border:#334155;
          --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8;
          --good:#22c55e; --err:#ef4444; --warn:#fbbf24; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
         font:14px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .bar { display:flex; align-items:center; gap:10px;
         padding:8px 14px; background:var(--panel);
         border-bottom:1px solid var(--border); }
  .title { font-weight:600; letter-spacing:0.05em; text-transform:uppercase;
           color:var(--accent); }
  .badge { padding:2px 8px; border-radius:4px;
           background:rgba(255,255,255,0.05); color:var(--muted);
           font:12px ui-monospace,SFMono-Regular,monospace; }

  .grid { display:grid; grid-template-columns:repeat(2,1fr);
          gap:12px; padding:12px;
          height:calc(100vh - 3rem); min-height:0; }
  @media (max-width:1100px) { .grid { grid-template-columns:1fr; height:auto; } }

  .tile { background:var(--panel); border:1px solid var(--border);
          border-radius:6px; display:flex; flex-direction:column;
          overflow:hidden; min-height:0; }
  .tile-head { padding:6px 10px; border-bottom:1px solid var(--border);
               background:rgba(0,0,0,0.15); font-size:12px; font-weight:500;
               display:flex; justify-content:space-between; align-items:center; }
  .tile-meta { font:10px ui-monospace,monospace; color:var(--muted); }
  .tile-body { flex:1; min-height:0; display:flex;
               align-items:center; justify-content:center; overflow:hidden; }
  .tile-body img { width:100%; height:100%; object-fit:contain; display:block; }
  .empty { color:var(--muted); font:12px ui-monospace,monospace;
           text-align:center; padding:20px; }
  .empty code { color:var(--accent); background:rgba(0,0,0,0.2);
                padding:1px 4px; border-radius:3px; }

  table { width:100%; border-collapse:collapse;
          font:11px/1.3 ui-monospace,SFMono-Regular,monospace; }
  th,td { padding:3px 6px; text-align:right; border-bottom:1px solid var(--border); }
  th { background:rgba(0,0,0,0.3); color:var(--muted);
       font-weight:500; position:sticky; top:0; }
  td:first-child, th:first-child { text-align:left; }
  tr.cls-own      { color:var(--good); }
  tr.cls-opponent { color:var(--err); }
  tr.cls-anchor   { color:var(--warn); }
</style>
</head>
<body>

<header class="bar">
  <span class="title">vision debug</span>
  <span class="badge">connected to holOS</span>
  <span style="flex:1"></span>
  <span class="badge" id="last-update">—</span>
</header>

<main class="grid">
  <section class="tile">
    <header class="tile-head">ArUco detection (raw frame)
      <span class="tile-meta" id="m-aruco"></span></header>
    <div class="tile-body" id="t-aruco">
      <div class="empty">waiting for feed_id <code>aruco</code></div>
    </div>
  </section>
  <section class="tile">
    <header class="tile-head">Localization — naive (BEV)
      <span class="tile-meta" id="m-naive"></span></header>
    <div class="tile-body" id="t-naive">
      <div class="empty">waiting for feed_id <code>loc_naive</code></div>
    </div>
  </section>
  <section class="tile">
    <header class="tile-head">Localization — corrected (BEV+grid)
      <span class="tile-meta" id="m-corr"></span></header>
    <div class="tile-body" id="t-corr">
      <div class="empty">waiting for feed_id <code>loc_corrected</code></div>
    </div>
  </section>
  <section class="tile">
    <header class="tile-head">Poses (data)
      <span class="tile-meta" id="m-poses"></span></header>
    <div class="tile-body" id="t-poses">
      <div class="empty">waiting for feed_id <code>poses_corrected</code></div>
    </div>
  </section>
</main>

<script src="/static/vendor/socket.io.min.js"></script>
<script>
/* Subscribes to holOS's `vision_feed` events directly. The page is
 * served from holOS itself, so io() connects to the same origin. */
const socket = io();
const slots = {
  aruco:           {body: document.getElementById('t-aruco'),  meta: document.getElementById('m-aruco')},
  loc_naive:       {body: document.getElementById('t-naive'),  meta: document.getElementById('m-naive')},
  loc_corrected:   {body: document.getElementById('t-corr'),   meta: document.getElementById('m-corr')},
  poses_corrected: {body: document.getElementById('t-poses'),  meta: document.getElementById('m-poses')},
};

socket.on('vision_feed', d => {
  if (!d || !d.feed_id || !slots[d.feed_id]) return;
  const slot = slots[d.feed_id];
  slot.meta.textContent = `${(new Date()).toLocaleTimeString()}`;
  document.getElementById('last-update').textContent = (new Date()).toLocaleTimeString();
  if (d.jpeg) {
    let img = slot.body.querySelector('img');
    if (!img) { slot.body.innerHTML=''; img = document.createElement('img'); slot.body.appendChild(img); }
    img.src = `data:image/jpeg;base64,${d.jpeg}`;
  } else if (Array.isArray(d.data)) {
    renderPoseTable(slot.body, d.data);
  }
});

function renderPoseTable(container, poses) {
  if (!poses.length) { container.innerHTML = `<div class="empty">no poses</div>`; return; }
  const has_naive = poses.some(p => p.naive_x_mm != null);
  const cols = has_naive
    ? ['tag_id','classification','x_mm','y_mm','naive_x_mm','naive_y_mm','theta_rad']
    : ['tag_id','classification','x_mm','y_mm','theta_rad'];
  const head = cols.map(c => `<th>${c}</th>`).join('');
  const body = poses.map(p => {
    const cls = p.classification || 'object';
    const tds = cols.map(c => {
      let v = p[c];
      if (typeof v === 'number') v = v.toFixed(c === 'theta_rad' ? 3 : 1);
      return `<td>${v == null ? '' : v}</td>`;
    }).join('');
    return `<tr class="cls-${cls}">${tds}</tr>`;
  }).join('');
  container.innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}
</script>
</body>
</html>
