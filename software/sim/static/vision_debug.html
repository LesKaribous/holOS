<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Vision debug · holOS</title>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --border:#334155;
          --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8;
          --good:#22c55e; --err:#ef4444; --warn:#fbbf24; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
         font:14px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .bar { display:flex; align-items:center; gap:10px;
         padding:8px 14px; background:var(--panel);
         border-bottom:1px solid var(--border); }
  .title { font-weight:600; letter-spacing:0.05em; text-transform:uppercase;
           color:var(--accent); }
  .badge { padding:2px 8px; border-radius:4px;
           background:rgba(255,255,255,0.05); color:var(--muted);
           font:12px ui-monospace,SFMono-Regular,monospace; }
  .badge.phase-idle      { color:var(--muted); }
  .badge.phase-capturing { color:var(--warn); background:rgba(251,191,36,0.1); }
  .badge.phase-locked    { color:var(--good); background:rgba(34,197,94,0.1); }

  .grid { display:grid; grid-template-columns:repeat(2,1fr);
          gap:12px; padding:12px;
          min-height:0; }
  @media (max-width:1100px) { .grid { grid-template-columns:1fr; } }

  .tile { background:var(--panel); border:1px solid var(--border);
          border-radius:6px; display:flex; flex-direction:column;
          overflow:hidden; min-height:0; }
  .tile-head { padding:6px 10px; border-bottom:1px solid var(--border);
               background:rgba(0,0,0,0.15); font-size:12px; font-weight:500;
               display:flex; justify-content:space-between; align-items:center; }
  .tile-meta { font:10px ui-monospace,monospace; color:var(--muted); }
  .tile-body { flex:1; min-height:0; display:flex;
               align-items:center; justify-content:center; overflow:hidden; }
  .tile-body img { width:100%; height:100%; object-fit:contain; display:block; }
  .empty { color:var(--muted); font:12px ui-monospace,monospace;
           text-align:center; padding:20px; }
  .empty code { color:var(--accent); background:rgba(0,0,0,0.2);
                padding:1px 4px; border-radius:3px; }

  table { width:100%; border-collapse:collapse;
          font:11px/1.3 ui-monospace,SFMono-Regular,monospace; }
  th,td { padding:3px 6px; text-align:right; border-bottom:1px solid var(--border); }
  th { background:rgba(0,0,0,0.3); color:var(--muted);
       font-weight:500; position:sticky; top:0; }
  td:first-child, th:first-child { text-align:left; }
  tr.cls-own      { color:var(--good); }
  tr.cls-opponent { color:var(--err); }
  tr.cls-anchor   { color:var(--warn); }

  /* Telemetry tile — vision pose vs robot pose, side-by-side */
  .tlm { display:grid; grid-template-columns:auto 1fr 1fr 1fr;
         gap:6px 14px; padding:10px 14px;
         font:12px ui-monospace,SFMono-Regular,monospace;
         align-items:baseline; width:100%; }
  .tlm .row-label { color:var(--muted); }
  .tlm .col-head  { color:var(--accent); font-weight:600;
                    border-bottom:1px solid var(--border); padding-bottom:2px; }
  .tlm .vision  { color:var(--good); }
  .tlm .robot   { color:var(--warn); }
  .tlm .delta   { color:var(--err); }
  .tlm .stale   { color:var(--muted); font-style:italic; }

  /* Calibration tile — single column key/value list */
  .calib { padding:10px 14px;
           font:12px ui-monospace,SFMono-Regular,monospace;
           display:grid; grid-template-columns:auto 1fr; gap:4px 14px;
           align-content:start; width:100%; }
  .calib .k { color:var(--muted); }
  .calib .v { color:var(--text); text-align:right; }
  .calib .v.warn { color:var(--warn); }
  .calib .section { grid-column:1/-1;
                    color:var(--accent); font-weight:600;
                    border-bottom:1px solid var(--border);
                    padding:6px 0 2px; margin-top:4px; }
  .calib .section:first-child { margin-top:0; }

  /* Log tile — newest at the top, monospace, color by level */
  .log { width:100%; height:100%; overflow:auto;
         padding:6px 10px;
         font:11px/1.4 ui-monospace,SFMono-Regular,monospace; }
  .log .row { display:flex; gap:8px; padding:1px 0;
              border-bottom:1px dotted rgba(255,255,255,0.04); }
  .log .row:last-child { border-bottom:none; }
  .log .t { color:var(--muted); flex:0 0 auto; }
  .log .m { flex:1 1 auto; word-break:break-word; }
  .log .row.lvl-info { color:var(--text); }
  .log .row.lvl-warn .m { color:var(--warn); }
  .log .row.lvl-err  .m { color:var(--err); }
</style>
</head>
<body>

<header class="bar">
  <span class="title">vision debug</span>
  <span class="badge">connected to holOS</span>
  <span class="badge phase-idle" id="phase-badge">homography: idle</span>
  <span style="flex:1"></span>
  <span class="badge" id="last-update">—</span>
</header>

<main class="grid">
  <section class="tile">
    <header class="tile-head">ArUco detection (raw frame)
      <span class="tile-meta" id="m-aruco"></span></header>
    <div class="tile-body" id="t-aruco">
      <div class="empty">waiting for feed_id <code>aruco</code></div>
    </div>
  </section>
  <section class="tile">
    <header class="tile-head">Localization — corrected (BEV+grid)
      <span class="tile-meta" id="m-corr"></span></header>
    <div class="tile-body" id="t-corr">
      <div class="empty">waiting for feed_id <code>loc_corrected</code></div>
    </div>
  </section>
  <section class="tile">
    <header class="tile-head">Poses (data)
      <span class="tile-meta" id="m-poses"></span></header>
    <div class="tile-body" id="t-poses">
      <div class="empty">waiting for feed_id <code>poses_corrected</code></div>
    </div>
  </section>
  <section class="tile">
    <header class="tile-head">Pose comparison — vision vs robot
      <span class="tile-meta" id="m-cmp"></span></header>
    <div class="tile-body" id="t-cmp"></div>
  </section>
  <section class="tile">
    <header class="tile-head">Recalage parameters
      <span class="tile-meta" id="m-calib"></span></header>
    <div class="tile-body" id="t-calib"></div>
  </section>
  <section class="tile" style="grid-column: 1 / -1;">
    <header class="tile-head">Vision log
      <span class="tile-meta" id="m-log"></span></header>
    <div class="tile-body" id="t-log"
         style="align-items:stretch; justify-content:flex-start;"></div>
  </section>
</main>

<script src="/static/vendor/socket.io.min.js"></script>
<script>
/* Subscribes to holOS's `vision_feed` events directly. The page is
 * served from holOS itself, so io() connects to the same origin. */
const socket = io();
const slots = {
  aruco:           {body: document.getElementById('t-aruco'),  meta: document.getElementById('m-aruco')},
  loc_corrected:   {body: document.getElementById('t-corr'),   meta: document.getElementById('m-corr')},
  poses_corrected: {body: document.getElementById('t-poses'),  meta: document.getElementById('m-poses')},
};

socket.on('vision_feed', d => {
  if (!d || !d.feed_id || !slots[d.feed_id]) return;
  const slot = slots[d.feed_id];
  slot.meta.textContent = `${(new Date()).toLocaleTimeString()}`;
  document.getElementById('last-update').textContent = (new Date()).toLocaleTimeString();
  if (d.jpeg) {
    let img = slot.body.querySelector('img');
    if (!img) { slot.body.innerHTML=''; img = document.createElement('img'); slot.body.appendChild(img); }
    img.src = `data:image/jpeg;base64,${d.jpeg}`;
  } else if (Array.isArray(d.data)) {
    renderPoseTable(slot.body, d.data);
  }
});

/* Robot pose comes from the regular holOS state event (60 Hz). We just
 * cache the latest one and re-render the comparison tile when either
 * side updates. */
let _robotPose = null;
socket.on('state', s => {
  const r = s && s.robot;
  if (!r) return;
  _robotPose = {
    x_mm:      typeof r.x === 'number' ? r.x : null,
    y_mm:      typeof r.y === 'number' ? r.y : null,
    theta_rad: typeof r.theta === 'number' ? r.theta : null,
  };
  renderCompare();
});

let _visionPose = null;
let _calibInfo  = null;   // /api/vision/calibration response

async function pollVision() {
  try {
    const r1 = await fetch('/api/vision/robot_pose');
    if (r1.ok) {
      const j = await r1.json();
      _visionPose = j.pose || null;
    } else {
      _visionPose = null;
    }
  } catch (_) { _visionPose = null; }

  try {
    const r2 = await fetch('/api/vision/calibration');
    if (r2.ok) _calibInfo = await r2.json();
  } catch (_) { /* leave previous */ }

  renderCompare();
  renderCalib();
  renderLog();
  updatePhaseBadge();
}
setInterval(pollVision, 500);
pollVision();

function renderLog() {
  const el = document.getElementById('t-log');
  const log = (_calibInfo && Array.isArray(_calibInfo.log)) ? _calibInfo.log : [];
  if (!log.length) {
    el.innerHTML = '<div class="empty">no events yet — interact with vision (recalage / homography_capture) to populate</div>';
    return;
  }
  // Newest at top.
  const rows = log.slice().reverse().map(e => {
    const lvl = e.level || 'info';
    const t   = e.t_iso || '';
    const m   = (e.msg || '').replace(/[<>]/g, c => c === '<' ? '&lt;' : '&gt;');
    return `<div class="row lvl-${lvl}"><span class="t">${t}</span><span class="m">${m}</span></div>`;
  }).join('');
  el.innerHTML = `<div class="log">${rows}</div>`;
  document.getElementById('m-log').textContent = `${log.length} entries`;
}

function renderPoseTable(container, poses) {
  if (!poses.length) { container.innerHTML = `<div class="empty">no poses</div>`; return; }
  const has_naive = poses.some(p => p.naive_x_mm != null);
  const cols = has_naive
    ? ['tag_id','classification','x_mm','y_mm','naive_x_mm','naive_y_mm','theta_rad']
    : ['tag_id','classification','x_mm','y_mm','theta_rad'];
  const head = cols.map(c => `<th>${c}</th>`).join('');
  const body = poses.map(p => {
    const cls = p.classification || 'object';
    const tds = cols.map(c => {
      let v = p[c];
      if (typeof v === 'number') v = v.toFixed(c === 'theta_rad' ? 3 : 1);
      return `<td>${v == null ? '' : v}</td>`;
    }).join('');
    return `<tr class="cls-${cls}">${tds}</tr>`;
  }).join('');
  container.innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}

function fmt(v, digits) {
  if (v === null || v === undefined || (typeof v === 'number' && !isFinite(v))) return '—';
  return Number(v).toFixed(digits);
}
function fmtDeg(rad, digits=1) {
  if (rad === null || rad === undefined) return '—';
  return (rad * 180 / Math.PI).toFixed(digits) + '°';
}

function renderCompare() {
  const c = document.getElementById('t-cmp');
  const v = _visionPose; const r = _robotPose;
  if (!v && !r) {
    c.innerHTML = '<div class="empty">waiting for telemetry</div>';
    return;
  }
  const dx = (v && r && v.x_mm != null && r.x_mm != null) ? (v.x_mm - r.x_mm) : null;
  const dy = (v && r && v.y_mm != null && r.y_mm != null) ? (v.y_mm - r.y_mm) : null;
  const dt = (v && r && v.theta_rad != null && r.theta_rad != null)
              ? wrapPi(v.theta_rad - r.theta_rad) : null;
  const dnorm = (dx !== null && dy !== null)
              ? Math.sqrt(dx*dx + dy*dy) : null;
  // Naive deltas — the BEV-pixel projection (no parallax). Showing both
  // makes the parallax tuning observable: shrinking residual = good.
  const nx = v ? v.naive_x_mm : null;
  const ny = v ? v.naive_y_mm : null;
  const ndx = (r && nx != null && r.x_mm != null) ? (nx - r.x_mm) : null;
  const ndy = (r && ny != null && r.y_mm != null) ? (ny - r.y_mm) : null;
  const ndnorm = (ndx !== null && ndy !== null)
              ? Math.sqrt(ndx*ndx + ndy*ndy) : null;
  const tagId = v && v.tag_id != null ? `tag #${v.tag_id}` : '';
  c.innerHTML = `
    <div class="tlm">
      <span></span>
      <span class="col-head vision">vision·corrected ${tagId ? '— '+tagId : ''}</span>
      <span class="col-head robot">robot (otos)</span>
      <span class="col-head delta">Δ corrected</span>

      <span class="row-label">x_mm</span>
      <span class="vision">${v ? fmt(v.x_mm, 1) : '<span class="stale">—</span>'}</span>
      <span class="robot">${r ? fmt(r.x_mm, 1) : '<span class="stale">—</span>'}</span>
      <span class="delta">${fmt(dx, 1)}</span>

      <span class="row-label">y_mm</span>
      <span class="vision">${v ? fmt(v.y_mm, 1) : '<span class="stale">—</span>'}</span>
      <span class="robot">${r ? fmt(r.y_mm, 1) : '<span class="stale">—</span>'}</span>
      <span class="delta">${fmt(dy, 1)}</span>

      <span class="row-label">theta</span>
      <span class="vision">${v ? fmtDeg(v.theta_rad) : '<span class="stale">—</span>'}</span>
      <span class="robot">${r ? fmtDeg(r.theta_rad) : '<span class="stale">—</span>'}</span>
      <span class="delta">${fmtDeg(dt)}</span>

      <span class="row-label">|Δxy| corrected</span>
      <span></span><span></span>
      <span class="delta">${fmt(dnorm, 1)} mm</span>

      <span class="row-label">x naive</span>
      <span class="vision">${nx != null ? fmt(nx, 1) : '<span class="stale">—</span>'}</span>
      <span></span>
      <span class="delta">${fmt(ndx, 1)}</span>

      <span class="row-label">y naive</span>
      <span class="vision">${ny != null ? fmt(ny, 1) : '<span class="stale">—</span>'}</span>
      <span></span>
      <span class="delta">${fmt(ndy, 1)}</span>

      <span class="row-label">|Δxy| naive</span>
      <span></span><span></span>
      <span class="delta">${fmt(ndnorm, 1)} mm</span>
    </div>
  `;
  document.getElementById('m-cmp').textContent = (new Date()).toLocaleTimeString();
}

function wrapPi(a) {
  let x = ((a + Math.PI) % (2 * Math.PI));
  if (x <= 0) x += 2 * Math.PI;
  return x - Math.PI;
}

function renderCalib() {
  const el = document.getElementById('t-calib');
  if (!_calibInfo) {
    el.innerHTML = '<div class="empty">waiting for /api/vision/calibration</div>';
    return;
  }
  const snap = _calibInfo.snapshot;
  const rect = _calibInfo.rectify || {};
  const ho_deg = _calibInfo.heading_offset_deg;

  let html = '<div class="calib">';
  html += '<div class="section">Homography</div>';
  html += `<span class="k">phase</span>
           <span class="v ${rect.capture_phase==='locked'?'':'warn'}">${rect.capture_phase || '—'}</span>`;
  html += `<span class="k">mode active</span>
           <span class="v">${rect.mode_active || '—'}</span>`;
  html += `<span class="k">live anchors</span>
           <span class="v">${rect.live_anchor_count != null ? rect.live_anchor_count : '—'}</span>`;
  html += `<span class="k">detected anchor ids</span>
           <span class="v">[${(rect.detected_anchor_ids || []).join(', ')}]</span>`;
  html += `<span class="k">locked age</span>
           <span class="v">${rect.locked_age_s != null ? rect.locked_age_s.toFixed(1)+' s' : '—'}</span>`;

  if (!snap) {
    html += '<div class="section">Recalage</div>';
    html += '<span class="k">snapshot</span><span class="v warn">no recalage yet</span>';
  } else {
    html += '<div class="section">Recalage snapshot</div>';
    html += `<span class="k">tag id</span>
             <span class="v">#${snap.tag_id} <span class="k">(${snap.team})</span></span>`;
    html += `<span class="k">pose source</span>
             <span class="v">${snap.pose_source || '—'}</span>`;
    html += `<span class="k">captured</span>
             <span class="v">${snap.captured_age_s.toFixed(1)} s ago</span>`;
    html += `<span class="k">robot_z_mm</span>
             <span class="v">${snap.robot_z_mm != null ? snap.robot_z_mm.toFixed(0) : '—'} mm</span>`;

    html += '<div class="section">Known robot pose (otos)</div>';
    const k = snap.known_pose || {};
    html += `<span class="k">x</span>
             <span class="v">${fmt(k.x_mm, 1)} mm</span>`;
    html += `<span class="k">y</span>
             <span class="v">${fmt(k.y_mm, 1)} mm</span>`;
    html += `<span class="k">theta</span>
             <span class="v">${fmtDeg(k.theta_rad)}</span>`;

    html += '<div class="section">Vision tag pose at recalage</div>';
    const tn = snap.tag_pose_naive || {};
    const tc = snap.tag_pose_corrected || {};
    html += `<span class="k">x — naive (BEV pixel proj)</span>
             <span class="v">${fmt(tn.x_mm, 1)} mm</span>`;
    html += `<span class="k">y — naive</span>
             <span class="v">${fmt(tn.y_mm, 1)} mm</span>`;
    html += `<span class="k">x — parallax-corrected</span>
             <span class="v">${fmt(tc.x_mm, 1)} mm</span>`;
    html += `<span class="k">y — parallax-corrected</span>
             <span class="v">${fmt(tc.y_mm, 1)} mm</span>`;
    html += `<span class="k">theta (raw tag)</span>
             <span class="v">${fmtDeg(tc.theta_rad)}</span>`;

    html += '<div class="section">Calibration deltas</div>';
    const xyN = snap.xy_offset_naive_mm || {};
    const xyC = snap.xy_offset_corrected_mm || {};
    html += `<span class="k">Δxy naive (parallax bias)</span>
             <span class="v">(${fmt(xyN.dx_mm, 1)}, ${fmt(xyN.dy_mm, 1)}) mm</span>`;
    html += `<span class="k">Δxy corrected (residual)</span>
             <span class="v">(${fmt(xyC.dx_mm, 1)}, ${fmt(xyC.dy_mm, 1)}) mm</span>`;
    html += `<span class="k">Δheading (robot − tag)</span>
             <span class="v">${fmtDeg(snap.heading_offset_rad)}</span>`;

    // Tuning hint: implied object_z_mm derived from (naive, known, cam).
    // If the residual is small, current params are good. If it's big and
    // the implied z_obj differs from the configured one, plug the
    // suggestion into ROBOT_Z_MM (vision_pipelines_def.py) and re-run.
    if (snap.cam_xyz_used != null) {
      html += '<div class="section">Parallax tuning hint</div>';
      const cam = snap.cam_xyz_used;
      html += `<span class="k">cam_xyz used</span>
               <span class="v">(${fmt(cam[0],0)}, ${fmt(cam[1],0)}, ${fmt(cam[2],0)}) mm</span>`;
      html += `<span class="k">object_z_mm (current)</span>
               <span class="v">${fmt(snap.parallax_object_z_mm, 0)} mm</span>`;
      const impliedClass = (snap.implied_object_z_mm != null
                            && snap.parallax_object_z_mm != null
                            && Math.abs(snap.implied_object_z_mm
                                       - snap.parallax_object_z_mm) > 50)
                           ? 'v warn' : 'v';
      html += `<span class="k">object_z_mm (implied)</span>
               <span class="${impliedClass}">${fmt(snap.implied_object_z_mm, 0)} mm</span>`;
    }
  }
  html += '</div>';
  el.innerHTML = html;
  document.getElementById('m-calib').textContent = (new Date()).toLocaleTimeString();
}

function updatePhaseBadge() {
  const b = document.getElementById('phase-badge');
  const phase = _calibInfo && _calibInfo.rectify && _calibInfo.rectify.capture_phase;
  b.className = 'badge phase-' + (phase || 'idle');
  b.textContent = 'homography: ' + (phase || 'idle');
}
</script>
</body>
</html>
