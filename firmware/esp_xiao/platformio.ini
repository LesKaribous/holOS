; holOS Xiao WiFi telemetry bridge — minimal deps (WiFi + NeoPixel only).
; Replaces the XBee module on Teensy 4.1 BRIDGE_XBEE (Serial2 @ 57600).

[env:seeed_xiao_esp32s3]
platform   = espressif32@6.3.2
board      = seeed_xiao_esp32s3
framework  = arduino

build_flags =
	-std=gnu++17
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1

monitor_speed = 115200
upload_speed  = 921600

; No external libs — only Arduino core (WiFi, ESPmDNS).
lib_deps =
