; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = teensy41

[env:teensy35_old_board]
platform = teensy@5.0
board = teensy35
framework = arduino
build_flags = -D TEENSY35 -D OLD_BOARD
lib_deps =
	SPI
	https://github.com/sparkfun/SparkFun_Qwiic_OTOS_Arduino_Library.git
	https://github.com/KurtE/ILI9341_t3n.git
	https://github.com/FrankBoesing/FastCRC.git
	https://github.com/luni64/TeensyStep.git
	https://github.com/ftrias/TeensyThreads.git

[env:teensy35]
platform = teensy@5.0
board = teensy35
framework = arduino
build_flags = -D TEENSY35
lib_deps =
	SPI
	https://github.com/sparkfun/SparkFun_Qwiic_OTOS_Arduino_Library.git
	https://github.com/KurtE/ILI9341_t3n.git
	https://github.com/FrankBoesing/FastCRC.git
	https://github.com/luni64/TeensyStep.git
	https://github.com/ftrias/TeensyThreads.git

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
build_flags =
	-D TEENSY41
	-D USB_DIRECT              ; Enable USB-CDC bridge path (holOS wired connection)
	-Os                        ; Optimise pour la taille (vs -O2 vitesse)
	-ffunction-sections        ; Section par fonction → linker peut éliminer les inutilisées
	-fdata-sections            ; Idem pour les données
	-Wl,--gc-sections          ; Dead-code elimination à la link
build_unflags =
	-O2                        ; Annule le flag par défaut de Teensyduino
lib_deps =
	SPI
	https://github.com/sparkfun/SparkFun_Qwiic_OTOS_Arduino_Library.git
	https://github.com/PaulStoffregen/ILI9341_t3.git
	https://github.com/FrankBoesing/FastCRC.git
	https://github.com/LesKaribous/TwinsyStep.git
	https://github.com/ftrias/TeensyThreads.git
	https://github.com/adafruit/Adafruit-PWM-Servo-Driver-Library.git